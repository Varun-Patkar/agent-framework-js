<!doctype html>
<html lang="en">
	<head>
		<meta charset="utf-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1" />
		<title>Orchestrator + subagents · agent-framework-js</title>
		<style>
			:root { --bg:#0d1117; --panel:#161b22; --border:#30363d; --text:#e6edf3; --muted:#8b949e; --accent:#2f81f7; --green:#3fb950; --math:#a371f7; --writer:#f0883e; }
			* { box-sizing:border-box; }
			body { margin:0; font:15px/1.5 ui-sans-serif,system-ui,sans-serif; background:var(--bg); color:var(--text); }
			.wrap { max-width:1000px; margin:0 auto; padding:28px 20px 80px; }
			h1 { font-size:22px; margin:0 0 4px; }
			.sub { color:var(--muted); margin:0 0 22px; }
			.grid { display:grid; grid-template-columns:1.4fr 1fr; gap:16px; }
			@media (max-width:820px){ .grid{ grid-template-columns:1fr; } }
			.card { background:var(--panel); border:1px solid var(--border); border-radius:10px; padding:16px; }
			label { font-size:13px; color:var(--muted); display:block; margin-bottom:6px; }
			.row { display:flex; gap:16px; flex-wrap:wrap; margin-bottom:14px; }
			.toggle { display:inline-flex; border:1px solid var(--border); border-radius:8px; overflow:hidden; }
			.toggle button { background:transparent; color:var(--text); border:0; padding:7px 12px; cursor:pointer; }
			.toggle button.on { background:var(--accent); color:#fff; }
			#log { height:360px; overflow:auto; display:flex; flex-direction:column; gap:10px; }
			.msg { padding:9px 12px; border-radius:10px; max-width:90%; }
			.user { background:#1f6feb33; align-self:flex-end; }
			.bot { background:#21262d; align-self:flex-start; white-space:pre-wrap; }
			.composer { display:flex; gap:8px; margin-top:12px; }
			.composer input { flex:1; background:#0d1117; border:1px solid var(--border); border-radius:8px; padding:10px; color:var(--text); font:inherit; }
			.composer button { background:var(--green); color:#04210c; border:0; padding:0 18px; border-radius:8px; font-weight:600; cursor:pointer; }
			.reset { background:transparent; color:var(--muted); border:1px solid var(--border); border-radius:8px; padding:6px 10px; cursor:pointer; font-size:12px; }
			.steps { display:flex; flex-direction:column; gap:8px; max-height:430px; overflow:auto; }
			.step { border-left:3px solid var(--border); padding:6px 10px; font-size:13px; background:#0d1117; border-radius:0 8px 8px 0; }
			.step.MathAgent { border-color:var(--math); }
			.step.WriterAgent { border-color:var(--writer); }
			.step .who { font-weight:600; }
			.step.MathAgent .who { color:var(--math); }
			.step.WriterAgent .who { color:var(--writer); }
			.step .t { color:var(--muted); font-size:11px; }
			.empty { color:var(--muted); font-size:13px; }
		</style>
	</head>
	<body>
		<div class="wrap">
			<h1>Multi-turn orchestrator + 2 subagents</h1>
			<p class="sub">Backend (Fastify). The orchestrator delegates to a Math agent (calculator MCP) and a Writer agent. The right panel shows, in order, which subagent ran.</p>

			<div class="row">
				<div>
					<label>Provider</label>
					<div class="toggle" id="provider"><button data-v="copilot" class="on">GitHub Copilot</button><button data-v="lmstudio">LM Studio</button></div>
				</div>
				<div>
					<label>Calculator MCP transport</label>
					<div class="toggle" id="mcp"><button data-v="stdio" class="on">stdio (bunx)</button><button data-v="http">http</button></div>
				</div>
				<div style="align-self:flex-end"><button class="reset" id="reset">Reset conversation</button></div>
			</div>

			<div class="grid">
				<div class="card">
					<label>Conversation</label>
					<div id="log"><div class="empty">Try: “Compute 12 * (7 + 3), then explain the result like I'm five.”</div></div>
					<div class="composer">
						<input id="msg" placeholder="Type a message…" />
						<button id="send">Send</button>
					</div>
				</div>
				<div class="card">
					<label>Subagent activity (in order)</label>
					<div class="steps" id="steps"><div class="empty">No delegations yet.</div></div>
				</div>
			</div>
		</div>

		<script>
			const sessionId = Math.random().toString(36).slice(2);
			const pick = (id) => { const g = document.getElementById(id); g.onclick = (e) => { if (e.target.tagName!=="BUTTON") return; [...g.children].forEach(b=>b.classList.remove("on")); e.target.classList.add("on"); }; return () => g.querySelector(".on").dataset.v; };
			const provider = pick("provider"), mcp = pick("mcp");
			const log = document.getElementById("log"), steps = document.getElementById("steps");
			const input = document.getElementById("msg"), sendBtn = document.getElementById("send");

			const add = (cls, text) => { const d = document.createElement("div"); d.className = "msg " + cls; d.textContent = text; log.appendChild(d); log.scrollTop = log.scrollHeight; return d; };
			const addStep = (name, phase, text) => {
				if (steps.querySelector(".empty")) steps.innerHTML = "";
				const d = document.createElement("div"); d.className = "step " + name;
				const time = new Date().toLocaleTimeString();
				d.innerHTML = `<span class="who">${name}</span> <span class="t">${phase} · ${time}</span><div>${text ?? ""}</div>`;
				steps.appendChild(d); steps.scrollTop = steps.scrollHeight;
			};

			async function send() {
				const message = input.value.trim();
				if (!message) return;
				input.value = ""; sendBtn.disabled = true;
				add("user", message);
				const bot = add("bot", "…");
				try {
					const res = await fetch("/api/chat", { method:"POST", headers:{ "Content-Type":"application/json" }, body: JSON.stringify({ sessionId, provider: provider(), mcp: mcp(), message }) });
					const reader = res.body.getReader(); const dec = new TextDecoder(); let buf = "";
					for (;;) {
						const { value, done } = await reader.read(); if (done) break;
						buf += dec.decode(value, { stream:true });
						const frames = buf.split("\n\n"); buf = frames.pop();
						for (const f of frames) {
							const ev = /event: (.*)/.exec(f)?.[1];
							const data = JSON.parse(/data: (.*)/.exec(f)?.[1] ?? "{}");
							if (ev === "subagent") addStep(data.name, data.phase, data.phase === "start" ? "▶ " + data.input : "✓ " + data.output);
							else if (ev === "answer") bot.textContent = data.text;
							else if (ev === "error") bot.textContent = "Error: " + data.message;
						}
					}
				} catch (e) { bot.textContent = "Error: " + e.message; }
				finally { sendBtn.disabled = false; }
			}
			sendBtn.onclick = send;
			input.onkeydown = (e) => { if (e.key === "Enter") send(); };
			document.getElementById("reset").onclick = async () => {
				await fetch("/api/reset", { method:"POST", headers:{ "Content-Type":"application/json" }, body: JSON.stringify({ sessionId }) });
				log.innerHTML = '<div class="empty">Conversation reset.</div>';
				steps.innerHTML = '<div class="empty">No delegations yet.</div>';
			};
		</script>
	</body>
</html>
