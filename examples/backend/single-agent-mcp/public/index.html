<!doctype html>
<html lang="en">
	<head>
		<meta charset="utf-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1" />
		<title>Single-agent + MCP · agent-framework-js</title>
		<style>
			:root {
				--bg: #0d1117;
				--panel: #161b22;
				--border: #30363d;
				--text: #e6edf3;
				--muted: #8b949e;
				--accent: #2f81f7;
				--green: #3fb950;
			}
			* { box-sizing: border-box; }
			body {
				margin: 0;
				font: 15px/1.5 ui-sans-serif, system-ui, sans-serif;
				background: var(--bg);
				color: var(--text);
			}
			.wrap { max-width: 820px; margin: 0 auto; padding: 32px 20px 80px; }
			h1 { font-size: 22px; margin: 0 0 4px; }
			.sub { color: var(--muted); margin: 0 0 24px; }
			.card {
				background: var(--panel);
				border: 1px solid var(--border);
				border-radius: 10px;
				padding: 18px;
				margin-bottom: 16px;
			}
			label { font-size: 13px; color: var(--muted); display: block; margin-bottom: 6px; }
			.row { display: flex; gap: 18px; flex-wrap: wrap; }
			.row > div { flex: 1; min-width: 200px; }
			.toggle { display: inline-flex; border: 1px solid var(--border); border-radius: 8px; overflow: hidden; }
			.toggle button {
				background: transparent; color: var(--text); border: 0; padding: 8px 14px;
				cursor: pointer; font-size: 14px;
			}
			.toggle button.on { background: var(--accent); color: #fff; }
			textarea {
				width: 100%; min-height: 70px; resize: vertical; background: #0d1117;
				color: var(--text); border: 1px solid var(--border); border-radius: 8px; padding: 10px;
				font: inherit;
			}
			.go {
				margin-top: 14px; background: var(--green); color: #04210c; border: 0;
				padding: 10px 20px; border-radius: 8px; font-weight: 600; cursor: pointer; font-size: 15px;
			}
			.go:disabled { opacity: 0.5; cursor: default; }
			.tools { font-size: 12px; color: var(--muted); margin-top: 10px; }
			.tools code { color: var(--accent); }
			pre {
				white-space: pre-wrap; word-break: break-word; background: #0d1117;
				border: 1px solid var(--border); border-radius: 8px; padding: 14px; min-height: 60px;
			}
			.err { color: #f85149; }
		</style>
	</head>
	<body>
		<div class="wrap">
			<h1>Single-turn agent + Calculator MCP</h1>
			<p class="sub">Backend (Fastify). Token is read server-side from <code>.env</code>. Supports both stdio &amp; http MCP.</p>

			<div class="card">
				<div class="row">
					<div>
						<label>Provider</label>
						<div class="toggle" id="provider">
							<button data-v="copilot" class="on">GitHub Copilot</button>
							<button data-v="lmstudio">LM Studio</button>
						</div>
					</div>
					<div>
						<label>MCP transport</label>
						<div class="toggle" id="mcp">
							<button data-v="stdio" class="on">stdio (bunx)</button>
							<button data-v="http">http</button>
						</div>
					</div>
				</div>
			</div>

			<div class="card">
				<label>Ask the calculator agent</label>
				<textarea id="prompt">What is the derivative of 3x^2 + 2x + 1, and then evaluate sqrt(144) + 5!?</textarea>
				<button class="go" id="go">Run</button>
				<div class="tools" id="tools"></div>
			</div>

			<div class="card">
				<label>Answer</label>
				<pre id="out"></pre>
			</div>
		</div>

		<script>
			// Simple segmented-toggle wiring shared by both groups.
			const pick = (id) => {
				const grp = document.getElementById(id);
				grp.addEventListener("click", (e) => {
					if (e.target.tagName !== "BUTTON") return;
					[...grp.children].forEach((b) => b.classList.remove("on"));
					e.target.classList.add("on");
				});
				return () => grp.querySelector(".on").dataset.v;
			};
			const provider = pick("provider");
			const mcp = pick("mcp");
			const out = document.getElementById("out");
			const tools = document.getElementById("tools");
			const go = document.getElementById("go");

			go.onclick = async () => {
				out.textContent = "";
				out.classList.remove("err");
				tools.textContent = "";
				go.disabled = true;
				try {
					const res = await fetch("/api/run", {
						method: "POST",
						headers: { "Content-Type": "application/json" },
						body: JSON.stringify({
							provider: provider(),
							mcp: mcp(),
							prompt: document.getElementById("prompt").value,
						}),
					});
					// Parse the SSE stream manually from the fetch body reader.
					const reader = res.body.getReader();
					const dec = new TextDecoder();
					let buf = "";
					for (;;) {
						const { value, done } = await reader.read();
						if (done) break;
						buf += dec.decode(value, { stream: true });
						const frames = buf.split("\n\n");
						buf = frames.pop();
						for (const f of frames) {
							const ev = /event: (.*)/.exec(f)?.[1];
							const data = JSON.parse(/data: (.*)/.exec(f)?.[1] ?? "{}");
							if (ev === "tools") tools.innerHTML = "MCP tools: " + data.names.map((n) => `<code>${n}</code>`).join(", ");
							else if (ev === "text") out.textContent += data.text;
							else if (ev === "error") { out.classList.add("err"); out.textContent = "Error: " + data.message; }
						}
					}
				} catch (e) {
					out.classList.add("err");
					out.textContent = "Error: " + e.message;
				} finally {
					go.disabled = false;
				}
			};
		</script>
	</body>
</html>
