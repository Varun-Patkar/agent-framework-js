root: true
parser: "@typescript-eslint/parser"
parserOptions:
  ecmaVersion: 2022
  sourceType: module
plugins:
  - "@typescript-eslint"
extends:
  - eslint:recommended
  - plugin:@typescript-eslint/recommended
env:
  es2022: true
  browser: true
  node: true
ignorePatterns:
  - dist
  - node_modules
  - "*.config.ts"
rules:
  "@typescript-eslint/no-explicit-any": warn
  "@typescript-eslint/explicit-module-boundary-types": off
  no-console: warn
