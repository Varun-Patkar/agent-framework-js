version: 2
updates:
  # npm dependencies
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 10
    labels:
      - "dependencies"
    groups:
      # Batch dev tooling (vitest/vite/esbuild/tsup/eslint/prettier/types) into one PR.
      dev-dependencies:
        dependency-type: "development"
    commit-message:
      prefix: "chore(deps)"
      prefix-development: "chore(dev-deps)"

  # GitHub Actions versions
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    labels:
      - "dependencies"
      - "github-actions"
    commit-message:
      prefix: "ci(deps)"
